name: Build And Release

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'samples/**'
      - '.github/workflows/release.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: codelogic-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.CODELOGIC_REPO_TOKEN || github.token }}

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Bump version from commit message
        id: version
        shell: pwsh
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          $csproj = 'src/CodeLogic.csproj'
          [xml]$proj = Get-Content $csproj
          $versionNode = $proj.Project.PropertyGroup | Where-Object { $_.Version } | Select-Object -First 1
          $currentVersion = $versionNode.Version
          if ([string]::IsNullOrWhiteSpace($currentVersion)) {
            throw "Could not read <Version> from $csproj"
          }

          # Determine bump level from commit message
          $msg = $env:COMMIT_MSG
          if ($msg -match '(?i)^breaking[:\s]|BREAKING CHANGE') {
            $bump = 'major'
          } elseif ($msg -match '(?i)^feat[:\s]') {
            $bump = 'minor'
          } else {
            $bump = 'patch'
          }

          $parts = $currentVersion.Split('.')
          $major = [int]$parts[0]; $minor = [int]$parts[1]; $patch = [int]$parts[2]

          switch ($bump) {
            'major' { $major++; $minor = 0; $patch = 0 }
            'minor' { $minor++; $patch = 0 }
            'patch' { $patch++ }
          }

          $newVersion = "$major.$minor.$patch"
          $versionNode.Version = $newVersion
          $proj.Save((Resolve-Path $csproj).Path)

          Write-Host "CodeLogic: $currentVersion -> $newVersion ($bump)"

          "current_version=$currentVersion" >> $env:GITHUB_OUTPUT
          "new_version=$newVersion" >> $env:GITHUB_OUTPUT
          "bump=$bump" >> $env:GITHUB_OUTPUT

      - name: Commit version bump
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/CodeLogic.csproj
          if git diff --cached --quiet; then
            echo "No version changes to commit"
          else
            git commit -m "chore: auto-bump CodeLogic ${{ steps.version.outputs.current_version }} → ${{ steps.version.outputs.new_version }} [skip ci]"
            git push
          fi

      - name: Restore
        run: dotnet restore src/CodeLogic.csproj

      - name: Build
        run: |
          dotnet build src/CodeLogic.csproj --configuration Release --no-restore \
            /p:Version=${{ steps.version.outputs.new_version }} \
            /p:InformationalVersion=${{ steps.version.outputs.new_version }}

      - name: Pack
        run: |
          dotnet pack src/CodeLogic.csproj --configuration Release --no-build --output artifacts \
            /p:PackageVersion=${{ steps.version.outputs.new_version }} \
            /p:Version=${{ steps.version.outputs.new_version }} \
            /p:InformationalVersion=${{ steps.version.outputs.new_version }}

      - name: Prepare release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null

          $runtimeZip = "artifacts/CodeLogic-${{ steps.version.outputs.new_version }}.zip"
          Compress-Archive -Path 'src/bin/Release/net10.0/*' -DestinationPath $runtimeZip -Force

          @"
          ## CodeLogic ${{ steps.version.outputs.new_version }}

          **Bump**: ${{ steps.version.outputs.bump }} (${{ steps.version.outputs.current_version }} → ${{ steps.version.outputs.new_version }})
          **Commit**: ${{ github.sha }}
          "@ | Set-Content 'artifacts/release-notes.md'

      - name: Push to NuGet.org
        run: dotnet nuget push artifacts/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.new_version }}
          name: CodeLogic ${{ steps.version.outputs.new_version }}
          body_path: artifacts/release-notes.md
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/*.nupkg
            artifacts/*.zip
