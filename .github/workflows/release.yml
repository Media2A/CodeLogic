name: Build And Release

on:
  push:
    branches:
      - release
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: codelogic-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: release
          token: ${{ secrets.CODELOGIC_REPO_TOKEN || github.token }}

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Bump version from commit message
        id: version
        shell: pwsh
        run: |
          $csproj = 'src/CodeLogic.csproj'
          [xml]$proj = Get-Content $csproj
          $versionNode = $proj.Project.PropertyGroup | Where-Object { $_.Version } | Select-Object -First 1
          $currentVersion = $versionNode.Version
          if ([string]::IsNullOrWhiteSpace($currentVersion)) {
            throw "Could not read <Version> from $csproj"
          }

          # Read the merge commit message for bump hints.
          # When merging main → release, the merge commit or the last
          # real commit determines the bump level.
          $msg = git log -1 --format=%B
          if ($msg -match '(?i)breaking[:\s]|BREAKING CHANGE') {
            $bump = 'major'
          } elseif ($msg -match '(?i)feat[:\s]') {
            $bump = 'minor'
          } else {
            # Look at all commits since the last tag for any feat/breaking
            $lastTag = git describe --tags --abbrev=0 2>$null
            if ($lastTag) {
              $log = git log "$lastTag..HEAD" --format=%s
              if ($log -match '(?i)breaking[:\s]|BREAKING CHANGE') {
                $bump = 'major'
              } elseif ($log -match '(?i)feat[:\s]') {
                $bump = 'minor'
              } else {
                $bump = 'patch'
              }
            } else {
              $bump = 'patch'
            }
          }

          $parts = $currentVersion.Split('.')
          $major = [int]$parts[0]; $minor = [int]$parts[1]; $patch = [int]$parts[2]

          switch ($bump) {
            'major' { $major++; $minor = 0; $patch = 0 }
            'minor' { $minor++; $patch = 0 }
            'patch' { $patch++ }
          }

          $newVersion = "$major.$minor.$patch"
          $versionNode.Version = $newVersion
          $proj.Save((Resolve-Path $csproj).Path)

          Write-Host "CodeLogic: $currentVersion -> $newVersion ($bump)"

          "current_version=$currentVersion" >> $env:GITHUB_OUTPUT
          "new_version=$newVersion" >> $env:GITHUB_OUTPUT
          "bump=$bump" >> $env:GITHUB_OUTPUT

      - name: Commit version bump
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/CodeLogic.csproj
          if git diff --cached --quiet; then
            echo "No version changes to commit"
          else
            git commit -m "chore: release CodeLogic ${{ steps.version.outputs.new_version }} [skip ci]"
            git push origin release
          fi

      - name: Restore
        run: dotnet restore src/CodeLogic.csproj

      - name: Build
        run: |
          dotnet build src/CodeLogic.csproj --configuration Release --no-restore \
            /p:Version=${{ steps.version.outputs.new_version }} \
            /p:InformationalVersion=${{ steps.version.outputs.new_version }}

      - name: Pack
        run: |
          dotnet pack src/CodeLogic.csproj --configuration Release --no-build --output artifacts \
            /p:PackageVersion=${{ steps.version.outputs.new_version }} \
            /p:Version=${{ steps.version.outputs.new_version }} \
            /p:InformationalVersion=${{ steps.version.outputs.new_version }}

      - name: Sign NuGet packages
        shell: bash
        run: |
          echo "${{ secrets.NUGET_SIGNING_CERT }}" | base64 -d > /tmp/nuget-sign.pfx
          for pkg in artifacts/*.nupkg; do
            dotnet nuget sign "$pkg" \
              --certificate-path /tmp/nuget-sign.pfx \
              --certificate-password "${{ secrets.NUGET_SIGNING_CERT_PASSWORD }}" \
              --timestamper http://timestamp.digicert.com \
              --overwrite
          done
          rm -f /tmp/nuget-sign.pfx

      - name: Push to NuGet.org
        run: dotnet nuget push artifacts/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Prepare release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null

          $runtimeZip = "artifacts/CodeLogic-${{ steps.version.outputs.new_version }}.zip"
          Compress-Archive -Path 'src/bin/Release/net10.0/*' -DestinationPath $runtimeZip -Force

          @"
          ## CodeLogic ${{ steps.version.outputs.new_version }}

          **Bump**: ${{ steps.version.outputs.bump }} (${{ steps.version.outputs.current_version }} → ${{ steps.version.outputs.new_version }})
          **Commit**: ${{ github.sha }}
          "@ | Set-Content 'artifacts/release-notes.md'

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.new_version }}
          name: CodeLogic ${{ steps.version.outputs.new_version }}
          body_path: artifacts/release-notes.md
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/*.nupkg
            artifacts/*.zip

      - name: Sync version bump back to main
        shell: bash
        run: |
          git fetch origin main
          git checkout main
          git merge release --no-edit -m "chore: sync release version bump to main [skip ci]"
          git push origin main
